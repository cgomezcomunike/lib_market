<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Concesionario Virtual</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Rajdhani:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --primary: #00e5ff;
    --primary-dark: #00b8d4;
    --accent: #ff6d00;
    --bg-dark: #0a0e17;
    --bg-card: rgba(12, 20, 35, 0.92);
    --text: #e0e6ed;
    --text-dim: #7a8ba8;
    --border: rgba(0, 229, 255, 0.15);
    --glow: 0 0 20px rgba(0, 229, 255, 0.3);
  }

  body {
    background: var(--bg-dark);
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
    cursor: default;
  }

  /* ─── SCREENS ─── */
  .screen {
    position: fixed;
    inset: 0;
    display: none;
    z-index: 100;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  .screen.active { display: flex; }

  /* ─── ANIMATED BG ─── */
  .screen-bg {
    position: absolute;
    inset: 0;
    background: 
      radial-gradient(ellipse at 20% 50%, rgba(0, 229, 255, 0.08) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 20%, rgba(255, 109, 0, 0.06) 0%, transparent 50%),
      radial-gradient(ellipse at 50% 80%, rgba(0, 229, 255, 0.04) 0%, transparent 50%),
      var(--bg-dark);
    z-index: -1;
  }
  .screen-bg::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image: 
      linear-gradient(rgba(0, 229, 255, 0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0, 229, 255, 0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    animation: gridMove 20s linear infinite;
  }
  @keyframes gridMove {
    0% { transform: translate(0, 0); }
    100% { transform: translate(40px, 40px); }
  }

  /* ─── LOGO ─── */
  .logo-container {
    text-align: center;
    margin-bottom: 36px;
    animation: fadeInDown 0.8s ease;
  }
  .logo-main {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(1.4rem, 4vw, 2.4rem);
    font-weight: 900;
    letter-spacing: 3px;
    background: linear-gradient(135deg, var(--primary), #fff, var(--primary));
    background-size: 200% 200%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: shimmer 3s ease infinite;
    text-transform: uppercase;
  }
  .logo-sub {
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    color: var(--text-dim);
    letter-spacing: 6px;
    text-transform: uppercase;
    margin-top: 4px;
  }
  @keyframes shimmer {
    0%, 100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
  }
  @keyframes fadeInDown {
    from { opacity: 0; transform: translateY(-30px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(0, 229, 255, 0.4); }
    50% { box-shadow: 0 0 0 10px rgba(0, 229, 255, 0); }
  }

  /* ─── CARD ─── */
  .card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 36px 32px;
    width: 90vw;
    max-width: 440px;
    backdrop-filter: blur(20px);
    box-shadow: var(--glow), 0 20px 60px rgba(0,0,0,0.5);
    animation: fadeInUp 0.6s ease 0.2s both;
  }

  .card h2 {
    font-family: 'Orbitron', sans-serif;
    font-size: 1.1rem;
    font-weight: 600;
    color: var(--primary);
    margin-bottom: 24px;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  /* ─── FORM ELEMENTS ─── */
  .form-group {
    margin-bottom: 20px;
  }
  .form-group label {
    display: block;
    font-size: 0.75rem;
    font-weight: 600;
    color: var(--text-dim);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .form-group input[type="text"] {
    width: 100%;
    padding: 12px 16px;
    background: rgba(0, 229, 255, 0.05);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    font-size: 1.1rem;
    font-weight: 500;
    outline: none;
    transition: all 0.3s;
  }
  .form-group input:focus {
    border-color: var(--primary);
    box-shadow: 0 0 12px rgba(0, 229, 255, 0.2);
  }

  /* ─── GENDER SELECTOR ─── */
  .gender-selector {
    display: flex;
    gap: 12px;
  }
  .gender-btn {
    flex: 1;
    padding: 14px;
    background: rgba(0, 229, 255, 0.05);
    border: 2px solid var(--border);
    border-radius: 12px;
    color: var(--text-dim);
    font-family: 'Rajdhani', sans-serif;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s;
    text-align: center;
  }
  .gender-btn:hover {
    border-color: rgba(0, 229, 255, 0.4);
    color: var(--text);
  }
  .gender-btn.selected {
    border-color: var(--primary);
    background: rgba(0, 229, 255, 0.12);
    color: var(--primary);
    box-shadow: 0 0 15px rgba(0, 229, 255, 0.15);
  }
  .gender-btn .icon {
    font-size: 1.8rem;
    display: block;
    margin-bottom: 4px;
  }

  /* ─── AVATAR SELECTOR ─── */
  .avatar-grid {
    display: flex;
    gap: 12px;
    justify-content: center;
  }
  .avatar-option {
    width: 90px;
    height: 90px;
    border-radius: 50%;
    border: 3px solid var(--border);
    cursor: pointer;
    transition: all 0.3s;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2.4rem;
    background: rgba(0, 229, 255, 0.04);
    position: relative;
    overflow: hidden;
  }
  .avatar-option:hover {
    border-color: rgba(0, 229, 255, 0.5);
    transform: scale(1.08);
  }
  .avatar-option.selected {
    border-color: var(--primary);
    box-shadow: 0 0 20px rgba(0, 229, 255, 0.3);
    transform: scale(1.1);
  }
  .avatar-option.selected::after {
    content: '✓';
    position: absolute;
    bottom: 2px;
    right: 2px;
    background: var(--primary);
    color: var(--bg-dark);
    width: 22px;
    height: 22px;
    border-radius: 50%;
    font-size: 0.7rem;
    font-weight: 900;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* ─── BUTTON ─── */
  .btn-primary {
    width: 100%;
    padding: 14px;
    margin-top: 8px;
    background: linear-gradient(135deg, var(--primary-dark), var(--primary));
    border: none;
    border-radius: 10px;
    color: var(--bg-dark);
    font-family: 'Orbitron', sans-serif;
    font-size: 0.85rem;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.3s;
    position: relative;
    overflow: hidden;
  }
  .btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 25px rgba(0, 229, 255, 0.35);
  }
  .btn-primary:active { transform: translateY(0); }
  .btn-primary:disabled {
    opacity: 0.3;
    cursor: not-allowed;
    transform: none !important;
    box-shadow: none !important;
  }

  /* ─── LOADING SCREEN ─── */
  #loadingScreen {
    z-index: 200;
  }
  .loading-content {
    text-align: center;
  }
  .loading-spinner {
    width: 60px;
    height: 60px;
    border: 3px solid var(--border);
    border-top-color: var(--primary);
    border-radius: 50%;
    animation: spin 1s linear infinite;
    margin: 0 auto 24px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text {
    font-family: 'Orbitron', sans-serif;
    font-size: 0.8rem;
    color: var(--primary);
    letter-spacing: 4px;
    text-transform: uppercase;
  }
  .loading-bar {
    width: 200px;
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    margin: 16px auto 0;
    overflow: hidden;
  }
  .loading-bar-fill {
    width: 0%;
    height: 100%;
    background: var(--primary);
    border-radius: 2px;
    transition: width 0.3s;
  }

  /* ─── HUD ─── */
  .hud {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 50;
    padding: 12px 20px;
    display: none;
    align-items: center;
    justify-content: space-between;
    background: linear-gradient(180deg, rgba(10, 14, 23, 0.95) 0%, transparent 100%);
    pointer-events: none;
  }
  .hud.active { display: flex; }
  .hud > * { pointer-events: auto; }

  .hud-left {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .hud-avatar {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: 2px solid var(--primary);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.2rem;
    background: var(--bg-card);
  }
  .hud-name {
    font-family: 'Orbitron', sans-serif;
    font-size: 0.75rem;
    font-weight: 600;
    color: var(--primary);
    letter-spacing: 1px;
  }
  .hud-center {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(0.6rem, 2vw, 0.85rem);
    font-weight: 700;
    letter-spacing: 2px;
    color: #fff;
    text-shadow: 0 0 20px rgba(0, 229, 255, 0.5);
  }
  .hud-hint {
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    color: var(--text-dim);
    letter-spacing: 1px;
  }

  /* ─── TOOLTIP / BRAND POPUP ─── */
  .brand-tooltip {
    position: fixed;
    z-index: 60;
    background: var(--bg-card);
    border: 1px solid var(--primary);
    border-radius: 12px;
    padding: 16px 20px;
    min-width: 200px;
    text-align: center;
    box-shadow: var(--glow), 0 10px 40px rgba(0,0,0,0.6);
    backdrop-filter: blur(16px);
    display: none;
    pointer-events: auto;
    animation: fadeIn 0.2s ease;
  }
  .brand-tooltip.active { display: block; }
  .brand-tooltip h3 {
    font-family: 'Orbitron', sans-serif;
    font-size: 0.85rem;
    font-weight: 700;
    color: var(--primary);
    margin-bottom: 10px;
    letter-spacing: 2px;
  }
  .brand-tooltip .btn-enter {
    padding: 10px 24px;
    background: linear-gradient(135deg, var(--accent), #ff8f00);
    border: none;
    border-radius: 8px;
    color: #fff;
    font-family: 'Orbitron', sans-serif;
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 2px;
    cursor: pointer;
    transition: all 0.3s;
    text-transform: uppercase;
  }
  .brand-tooltip .btn-enter:hover {
    transform: scale(1.05);
    box-shadow: 0 4px 15px rgba(255, 109, 0, 0.4);
  }

  /* ─── MINIMAP ─── */
  .minimap {
    position: fixed;
    bottom: 16px;
    right: 16px;
    width: 150px;
    height: 150px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    z-index: 50;
    display: none;
    overflow: hidden;
  }
  .minimap.active { display: block; }
  .minimap canvas {
    width: 100%;
    height: 100%;
  }

  /* ─── ZOOM BUTTONS ─── */
  .zoom-controls {
    position: fixed;
    bottom: 20px;
    left: 20px;
    z-index: 55;
    display: none;
    flex-direction: column;
    gap: 6px;
  }
  .zoom-controls.active { display: flex; }
  .zoom-btn {
    width: 44px;
    height: 44px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--bg-card);
    color: var(--primary);
    font-size: 1.4rem;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(10px);
    transition: all 0.2s;
    font-family: 'Rajdhani', sans-serif;
  }
  .zoom-btn:hover {
    background: rgba(0, 229, 255, 0.1);
    border-color: var(--primary);
  }
  .zoom-btn:active {
    transform: scale(0.92);
  }

  /* ─── CONTROLS HINT (mobile) ─── */
  .mobile-controls {
    position: fixed;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 50;
    display: none;
    gap: 8px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 30px;
    padding: 8px 16px;
  }

  /* Canvas */
  #gameCanvas {
    position: fixed;
    inset: 0;
    display: none;
  }
  #gameCanvas.active { display: block; }

  /* Responsive */
  @media (max-width: 500px) {
    .card { padding: 24px 20px; }
    .avatar-option { width: 72px; height: 72px; font-size: 2rem; }
  }
</style>
</head>
<body>

<!-- ═══════════ SCREEN 1: REGISTRATION ═══════════ -->
<div id="registerScreen" class="screen active">
  <div class="screen-bg"></div>
  <div class="logo-container">
    <div class="logo-main">Concesionario Virtual</div>
    <div class="logo-sub">.co — Tu ciudad automotriz</div>
  </div>
  <div class="card">
    <h2>Crear Perfil</h2>
    <div class="form-group">
      <label>Tu Nombre / Nick</label>
      <input type="text" id="nickInput" placeholder="¿Cómo te llamas, parce?" maxlength="16" autocomplete="off" />
    </div>
    <div class="form-group">
      <label>Género</label>
      <div class="gender-selector">
        <button class="gender-btn" data-gender="M" onclick="selectGender('M', this)">
          <span class="icon">♂</span>
          Masculino
        </button>
        <button class="gender-btn" data-gender="F" onclick="selectGender('F', this)">
          <span class="icon">♀</span>
          Femenino
        </button>
      </div>
    </div>
    <div class="form-group" id="avatarSection" style="display:none;">
      <label>Escoge tu Avatar</label>
      <div class="avatar-grid" id="avatarGrid"></div>
    </div>
    <button class="btn-primary" id="btnEnter" disabled onclick="enterGame()">
      Ingresar al Mundo
    </button>
  </div>
</div>

<!-- ═══════════ SCREEN 2: LOADING ═══════════ -->
<div id="loadingScreen" class="screen">
  <div class="screen-bg"></div>
  <div class="loading-content">
    <div class="loading-spinner"></div>
    <div class="loading-text">Construyendo Ciudad</div>
    <div class="loading-bar"><div class="loading-bar-fill" id="loadingBar"></div></div>
    <div style="margin-top:12px; font-size:0.7rem; color:var(--text-dim); font-family:'Space Mono',monospace;" id="loadingStatus">Preparando terreno...</div>
  </div>
</div>

<!-- ═══════════ HUD ═══════════ -->
<div class="hud" id="hud">
  <div class="hud-left">
    <div class="hud-avatar" id="hudAvatar"></div>
    <div class="hud-name" id="hudName"></div>
  </div>
  <div class="hud-center">CONCESIONARIO VIRTUAL</div>
  <div class="hud-hint" id="hudHint">Arrastra para moverte · Scroll/+- para zoom · Click en un concesionario</div>
</div>

<!-- ═══════════ BRAND TOOLTIP ═══════════ -->
<div class="brand-tooltip" id="brandTooltip">
  <h3 id="tooltipBrand"></h3>
  <p style="font-size:0.8rem; color:var(--text-dim); margin-bottom:12px;" id="tooltipDesc"></p>
  <button class="btn-enter" id="tooltipEnter" onclick="enterBrand()">Entrar al Mundo</button>
</div>

<!-- ═══════════ MINIMAP ═══════════ -->
<div class="minimap" id="minimap">
  <canvas id="minimapCanvas" width="150" height="150"></canvas>
</div>

<!-- ═══════════ ZOOM CONTROLS ═══════════ -->
<div class="zoom-controls" id="zoomControls">
  <button class="zoom-btn" onclick="zoomIn()">+</button>
  <button class="zoom-btn" onclick="zoomOut()">−</button>
</div>

<!-- ═══════════ THREE.JS CANVAS ═══════════ -->
<canvas id="gameCanvas"></canvas>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/DRACOLoader.js"></script>
<script>
// ═══════════════════════════════════════════════════
// GAME STATE
// ═══════════════════════════════════════════════════
const STATE = {
  nick: '',
  gender: '',
  avatar: '',
  avatarEmoji: '',
  selectedBrand: null,
};

// ═══════════════════════════════════════════════════
// ⚙️ CONFIGURACIÓN CDN — EDITÁ ESTO CON TUS DATOS
// ═══════════════════════════════════════════════════
const S3_CONFIG = {
  // URL base de tu CDN en Cloudflare (sin slash al final)
  // Ejemplo: 'https://cdn.concesionariovirtual.co/models'
  baseUrl: 'https://cdn.concesionariovirtual.co/models',
  
  // ─── Plaza central ───
  plazaFile: 'plaza.glb',       // nombre del archivo GLB de la plaza
  plazaScale: 1.0,              // escala del modelo
  plazaRotation: 0,             // rotación Y en radianes
  
  // Mapeo: nombre de marca → nombre del archivo GLB
  // Por defecto se genera automático: marca en minúsculas, espacios = guión + .glb
  // Solo agregá los que tengan nombre diferente:
  fileOverrides: {
    'MERCEDES BENZ': 'mercedes-benz.glb',
    'LANDROVER':     'land-rover.glb',
    // 'MARCA': 'nombre-archivo.glb',
  },
  
  // Escala por defecto de los modelos GLB
  defaultScale: 1.0,
  
  // Escalas específicas por marca
  scaleOverrides: {
    // 'CHEVROLET': 0.8,
  },
  
  // Rotación Y en radianes por marca (para orientar la fachada)
  rotationOverrides: {
    // 'CHEVROLET': Math.PI / 2,
  },
};

// Genera el nombre de archivo GLB para una marca
function getGlbUrl(brand) {
  const filename = S3_CONFIG.fileOverrides[brand] 
    || brand.toLowerCase().replace(/\s+/g, '-') + '.glb';
  return `${S3_CONFIG.baseUrl}/${filename}`;
}

// ═══════════════════════════════════════════════════
// GLB LOADER — Lazy loading por distancia + Cloudflare CDN
// ═══════════════════════════════════════════════════
let gltfLoader, dracoLoader;
const glbCache = new Map();
const loadingQueue = new Set();
const LOAD_DISTANCE = 70;
const MAX_CONCURRENT_LOADS = 3;
let activeLoads = 0;

const dealershipData = new Map();

function initLoaders() {
  gltfLoader = new THREE.GLTFLoader();
  dracoLoader = new THREE.DRACOLoader();
  dracoLoader.setDecoderPath('https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/libs/draco/');
  gltfLoader.setDRACOLoader(dracoLoader);
}

function loadGlbForBrand(brand) {
  if (glbCache.has(brand) || loadingQueue.has(brand)) return;
  if (activeLoads >= MAX_CONCURRENT_LOADS) return;
  
  loadingQueue.add(brand);
  activeLoads++;
  
  const url = getGlbUrl(brand);
  const data = dealershipData.get(brand);
  
  gltfLoader.load(
    url,
    (gltf) => {
      activeLoads--;
      loadingQueue.delete(brand);
      
      const model = gltf.scene;
      const scale = S3_CONFIG.scaleOverrides[brand] || S3_CONFIG.defaultScale;
      model.scale.set(scale, scale, scale);
      
      if (S3_CONFIG.rotationOverrides[brand] !== undefined) {
        model.rotation.y = S3_CONFIG.rotationOverrides[brand];
      }
      
      model.traverse((child) => {
        if (child.isMesh) {
          child.castShadow = true;
          child.receiveShadow = true;
          child.userData.brand = brand;
          child.userData.group = data.placeholder;
          child.userData.originalColor = BRAND_COLORS[brand] || 0x556677;
          buildings.push(child);
        }
      });
      
      const box = new THREE.Box3().setFromObject(model);
      const center = box.getCenter(new THREE.Vector3());
      model.position.x = -center.x;
      model.position.z = -center.z;
      model.position.y = -box.min.y;
      
      const container = new THREE.Group();
      container.position.set(data.x, 0, data.z);
      container.add(model);
      
      if (data.placeholder) data.placeholder.visible = false;
      scene.add(container);
      
      data.glbModel = container;
      data.loaded = true;
      glbCache.set(brand, model);
      console.log(`✅ ${brand}`);
    },
    undefined,
    (error) => {
      activeLoads--;
      loadingQueue.delete(brand);
      console.warn(`⚠️ ${brand}: usando placeholder (${error.message})`);
    }
  );
}

function updateGlbLoading() {
  dealershipData.forEach((data, brand) => {
    if (data.loaded) return;
    const dx = cameraPos.x - data.x;
    const dz = cameraPos.z - data.z;
    const dist = Math.sqrt(dx * dx + dz * dz);
    if (dist < LOAD_DISTANCE) loadGlbForBrand(brand);
  });
}

const BRANDS = [
  'CHEVROLET','RENAULT','SUZUKI','MG','JEEP','DODGE','CHRYSLER','RAM',
  'CITROEN','JMC','DONGFENG','DFSK','BYD','GWM','HYUNDAI','SUBARU',
  'FORLAND','MERCEDES BENZ','TOYOTA','MAZDA','FORD','KIA','NISSAN',
  'VOLKSWAGEN','BMW','HONDA','AUDI','MITSUBISHI','VOLVO','FIAT',

function selectGender(gender, el) {
  STATE.gender = gender;
  STATE.avatar = '';
  document.querySelectorAll('.gender-btn').forEach(b => b.classList.remove('selected'));
  el.classList.add('selected');
  
  const section = document.getElementById('avatarSection');
  const grid = document.getElementById('avatarGrid');
  section.style.display = 'block';
  grid.innerHTML = '';
  
  AVATARS[gender].forEach((emoji, i) => {
    const div = document.createElement('div');
    div.className = 'avatar-option';
    div.textContent = emoji;
    div.onclick = () => selectAvatar(i, emoji, div);
    grid.appendChild(div);
  });
  checkReady();
}

function selectAvatar(index, emoji, el) {
  STATE.avatar = index;
  STATE.avatarEmoji = emoji;
  document.querySelectorAll('.avatar-option').forEach(a => a.classList.remove('selected'));
  el.classList.add('selected');
  checkReady();
}

function checkReady() {
  const nick = document.getElementById('nickInput').value.trim();
  STATE.nick = nick;
  const ready = nick.length >= 2 && STATE.gender && STATE.avatar !== '';
  document.getElementById('btnEnter').disabled = !ready;
}

function enterGame() {
  if (document.getElementById('btnEnter').disabled) return;
  
  document.getElementById('registerScreen').classList.remove('active');
  document.getElementById('loadingScreen').classList.add('active');
  
  const bar = document.getElementById('loadingBar');
  const status = document.getElementById('loadingStatus');
  const steps = [
    [10, 'Generando terreno...'],
    [25, 'Construyendo plaza central...'],
    [40, 'Levantando concesionarios...'],
    [55, 'Añadiendo detalles urbanos...'],
    [70, 'Iluminando la ciudad...'],
    [85, 'Colocando señalización...'],
    [95, 'Casi listo...'],
    [100, '¡Bienvenido!']
  ];
  
  let i = 0;
  const interval = setInterval(() => {
    if (i < steps.length) {
      bar.style.width = steps[i][0] + '%';
      status.textContent = steps[i][1];
      i++;
    } else {
      clearInterval(interval);
      setTimeout(() => {
        document.getElementById('loadingScreen').classList.remove('active');
        startGame();
      }, 400);
    }
  }, 350);
}

function buildGround() {
  // Main ground (warm sandy/grass tone)
  const groundGeo = new THREE.PlaneGeometry(300, 300);
  const groundMat = new THREE.MeshStandardMaterial({
    color: 0x8fbc6a,
    roughness: 0.95,
    metalness: 0.0
  });
  const ground = new THREE.Mesh(groundGeo, groundMat);
  ground.rotation.x = -Math.PI / 2;
  ground.position.y = -0.1;
  ground.receiveShadow = true;
  scene.add(ground);
  
  // Roads grid (warm asphalt)
  const roadMat = new THREE.MeshStandardMaterial({
    color: 0x6b6b6b,
    roughness: 0.8,
    metalness: 0.1
  });
  
  // Main roads forming the grid
  for (let i = -3; i <= 3; i++) {
    // Horizontal roads
    const hRoad = new THREE.Mesh(
      new THREE.PlaneGeometry(200, 6),
      roadMat
    );
    hRoad.rotation.x = -Math.PI / 2;
    hRoad.position.set(0, 0.01, i * 20);
    hRoad.receiveShadow = true;
    scene.add(hRoad);
    
    // Vertical roads
    const vRoad = new THREE.Mesh(
      new THREE.PlaneGeometry(6, 200),
      roadMat
    );
    vRoad.rotation.x = -Math.PI / 2;
    vRoad.position.set(i * 20, 0.01, 0);
    vRoad.receiveShadow = true;
    scene.add(vRoad);
  }
  
  // Road markings (dashed center lines)
  const lineMat = new THREE.MeshBasicMaterial({ color: 0xccccaa });
  for (let i = -3; i <= 3; i++) {
    for (let d = -50; d < 50; d += 4) {
      const dash = new THREE.Mesh(new THREE.PlaneGeometry(2, 0.15), lineMat);
      dash.rotation.x = -Math.PI / 2;
      dash.position.set(d, 0.05, i * 20);
      scene.add(dash);
      
      const dashV = new THREE.Mesh(new THREE.PlaneGeometry(0.15, 2), lineMat);
      dashV.rotation.x = -Math.PI / 2;
      dashV.position.set(i * 20, 0.05, d);
      scene.add(dashV);
    }
  }
}

function loadPlazaGlb() {
  const url = `${S3_CONFIG.baseUrl}/${S3_CONFIG.plazaFile}`;
  
  gltfLoader.load(
    url,
    (gltf) => {
      const model = gltf.scene;
      
      const scale = S3_CONFIG.plazaScale;
      model.scale.set(scale, scale, scale);
      model.rotation.y = S3_CONFIG.plazaRotation;
      
      model.traverse((child) => {
        if (child.isMesh) {
          child.castShadow = true;
          child.receiveShadow = true;
        }
      });
      
      // Centrar sobre el origen
      const box = new THREE.Box3().setFromObject(model);
      const center = box.getCenter(new THREE.Vector3());
      model.position.x = -center.x;
      model.position.z = -center.z;
      model.position.y = -box.min.y;
      
      // Ocultar placeholder, mostrar modelo
      if (plazaPlaceholder) plazaPlaceholder.visible = false;
      scene.add(model);
      
      console.log('✅ Plaza GLB cargada');
    },
    undefined,
    (error) => {
      console.warn(`⚠️ Plaza: usando placeholder (${error.message})`);
    }
  );
}

function buildConcesionarios() {
  // Layout: buildings go in the CENTER of each city block
  // Roads are at multiples of 20 (x = ...,-20, 0, 20,...)
  // So block centers are at multiples of 20 OFFSET by 10 (x = ...,-10, 10, 30,...)
  // Block [0,0] centered at (10,10) is nearest to plaza, skip blocks too close to plaza
  
  const blockCenters = [];
  for (let bx = -3; bx <= 3; bx++) {
    for (let bz = -3; bz <= 3; bz++) {
      const cx = bx * 20 + 10;
      const cz = bz * 20 + 10;
      // Skip blocks that overlap with the central plaza (within ~12 units of origin)
      const dist = Math.sqrt(cx * cx + cz * cz);
      if (dist < 15) continue;
      blockCenters.push([cx, cz, dist]);
    }
  }
  
  // Sort by distance from center so closest brands are near the plaza
  blockCenters.sort((a, b) => a[2] - b[2]);
  
  for (let i = 0; i < BRANDS.length && i < blockCenters.length; i++) {
    const brand = BRANDS[i];
    const [x, z] = blockCenters[i];
    createDealership(brand, x, z);
  }
}

function createDealership(brand, x, z) {
  const group = new THREE.Group();
  group.position.set(x, 0, z);
  
  const color = BRAND_COLORS[brand] || 0x556677;
  const height = 4 + Math.random() * 4;
  const width = 10 + Math.random() * 2;  // max 12, fits in 14-unit block
  const depth = 6 + Math.random() * 2;   // max 8, fits in 14-unit block
  
  // ═══ PLACEHOLDER BUILDING (se muestra mientras carga el GLB) ═══
  // Main building
  const buildingGeo = new THREE.BoxGeometry(width, height, depth);
  const buildingMat = new THREE.MeshStandardMaterial({
    color: color,
    roughness: 0.4,
    metalness: 0.3,
  });
  const building = new THREE.Mesh(buildingGeo, buildingMat);
  building.position.y = height / 2;
  building.castShadow = true;
  building.receiveShadow = true;
  group.add(building);
  
  // Glass facade (front)
  const glassMat = new THREE.MeshStandardMaterial({
    color: 0xffeedd,
    roughness: 0.1,
    metalness: 0.9,
    transparent: true,
    opacity: 0.4,
    envMapIntensity: 2
  });
  const glass = new THREE.Mesh(
    new THREE.PlaneGeometry(width * 0.8, height * 0.6),
    glassMat
  );
  glass.position.set(0, height * 0.45, depth / 2 + 0.05);
  group.add(glass);
  
  // Brand sign on building
  const brandCanvas = document.createElement('canvas');
  brandCanvas.width = 512;
  brandCanvas.height = 128;
  const bctx = brandCanvas.getContext('2d');
  
  // Sign background
  bctx.fillStyle = '#0a0e17';
  bctx.fillRect(0, 0, 512, 128);
  bctx.strokeStyle = '#00e5ff';
  bctx.lineWidth = 2;
  bctx.strokeRect(4, 4, 504, 120);
  
  // Brand name
  bctx.fillStyle = '#ffffff';
  bctx.font = 'bold 42px Arial';
  bctx.textAlign = 'center';
  bctx.textBaseline = 'middle';
  bctx.fillText(brand, 256, 64);
  
  const brandTex = new THREE.CanvasTexture(brandCanvas);
  const signMat = new THREE.MeshStandardMaterial({
    map: brandTex,
    emissive: new THREE.Color(color),
    emissiveIntensity: 0.3
  });
  
  const brandSign = new THREE.Mesh(
    new THREE.PlaneGeometry(width * 0.7, height * 0.2),
    signMat
  );
  brandSign.position.set(0, height + 0.5, depth / 2 + 0.05);
  group.add(brandSign);
  
  // Roof accent
  const roofGeo = new THREE.BoxGeometry(width + 0.4, 0.3, depth + 0.4);
  const roofMat = new THREE.MeshStandardMaterial({
    color: 0x222222,
    roughness: 0.5,
    metalness: 0.5
  });
  const roof = new THREE.Mesh(roofGeo, roofMat);
  roof.position.y = height + 0.15;
  roof.castShadow = true;
  group.add(roof);
  
  // Showroom floor (lighter area in front)
  const floorMat = new THREE.MeshStandardMaterial({
    color: 0x999080,
    roughness: 0.6,
    metalness: 0.1,
    emissive: new THREE.Color(color),
    emissiveIntensity: 0.05
  });
  const showFloor = new THREE.Mesh(
    new THREE.PlaneGeometry(width, 4),
    floorMat
  );
  showFloor.rotation.x = -Math.PI / 2;
  showFloor.position.set(0, 0.02, depth / 2 + 2);
  group.add(showFloor);
  
  // Accent lights on building (small glowing boxes)
  const accentMat = new THREE.MeshBasicMaterial({ color: 0xffcc66 });
  for (let li = 0; li < 3; li++) {
    const light = new THREE.Mesh(
      new THREE.BoxGeometry(0.15, 0.15, 0.15),
      accentMat
    );
    light.position.set(
      (li - 1) * (width * 0.3),
      height + 0.3,
      depth / 2
    );
    group.add(light);
  }
  
  scene.add(group);
  
  // Store building data for raycasting
  building.userData.brand = brand;
  building.userData.group = group;
  building.userData.originalColor = color;
  buildings.push(building);
  
  // Also make glass and sign clickable
  glass.userData.brand = brand;
  glass.userData.group = group;
  glass.userData.originalColor = color;
  buildings.push(glass);
  
  // ═══ Registrar para carga de GLB ═══
  dealershipData.set(brand, {
    x, z,
    placeholder: group,  // el edificio placeholder
    glbModel: null,
    loaded: false
  });
}

function buildEnvironment() {
  // Street lights along roads
  const lightPoleGeo = new THREE.CylinderGeometry(0.08, 0.1, 5, 8);
  const lightPoleMat = new THREE.MeshStandardMaterial({ color: 0x8a7a6a, metalness: 0.6 });
  const lightBulbMat = new THREE.MeshBasicMaterial({ color: 0xffdd88 });
  
  for (let i = -3; i <= 3; i++) {
    for (let j = -3; j <= 3; j++) {
      // Skip center
      if (i === 0 && j === 0) continue;
      
      // Place at road intersections
      const lx = i * 20 + 3;
      const lz = j * 20 + 3;
      
      const pole = new THREE.Mesh(lightPoleGeo, lightPoleMat);
      pole.position.set(lx, 2.5, lz);
      pole.castShadow = true;
      scene.add(pole);
      
      // Lamp arm
      const arm = new THREE.Mesh(
        new THREE.BoxGeometry(1.5, 0.1, 0.1),
        lightPoleMat
      );
      arm.position.set(lx - 0.75, 5, lz);
      scene.add(arm);
      
      // Lamp
      const lamp = new THREE.Mesh(
        new THREE.SphereGeometry(0.2, 8, 8),
        lightBulbMat
      );
      lamp.position.set(lx - 1.5, 4.9, lz);
      scene.add(lamp);
      
      // Actual point light (only some, for performance)
      if ((i + j) % 2 === 0) {
        const pl = new THREE.PointLight(0xffcc77, 0.5, 15);
        pl.position.set(lx - 1.5, 4.8, lz);
        scene.add(pl);
      }
    }
  }
  
  // Trees (warm greens)
  const treeTrunkMat = new THREE.MeshStandardMaterial({ color: 0x7a5230 });
  const treeLeafMat = new THREE.MeshStandardMaterial({ color: 0x4a8c3f });
  
  for (let i = 0; i < 40; i++) {
    const tx = (Math.random() - 0.5) * 120;
    const tz = (Math.random() - 0.5) * 120;
    
    // Don't place on roads or plaza
    if (Math.abs(tx) < 10 && Math.abs(tz) < 10) continue;
    const onRoadH = false; // simplified check
    
    const trunk = new THREE.Mesh(
      new THREE.CylinderGeometry(0.15, 0.2, 1.5, 6),
      treeTrunkMat
    );
    trunk.position.set(tx, 0.75, tz);
    trunk.castShadow = true;
    scene.add(trunk);
    
    const canopy = new THREE.Mesh(
      new THREE.ConeGeometry(1.2, 2.5, 8),
      treeLeafMat
    );
    canopy.position.set(tx, 2.8, tz);
    canopy.castShadow = true;
    scene.add(canopy);
  }
  
  // Sidewalk curbs
  const curbMat = new THREE.MeshStandardMaterial({ color: 0xb8a898 });
  for (let i = -3; i <= 3; i++) {
    for (let dir = -1; dir <= 1; dir += 2) {
      // Horizontal curbs
      const hCurb = new THREE.Mesh(
        new THREE.BoxGeometry(20, 0.15, 0.3),
        curbMat
      );
      hCurb.position.set(i * 20, 0.08, i * 20 + dir * 3.15);
      scene.add(hCurb);
    }
  }
}

const clouds = [];

function buildClouds() {
  const cloudMat = new THREE.MeshStandardMaterial({
    color: 0xffffff,
    roughness: 1,
    metalness: 0,
    transparent: true,
    opacity: 0.85,
  });
  
  for (let i = 0; i < 8; i++) {
    const cloudGroup = new THREE.Group();
    
    // Each cloud = cluster of 3-5 soft spheres
    const puffs = 3 + Math.floor(Math.random() * 3);
    for (let p = 0; p < puffs; p++) {
      const size = 3 + Math.random() * 5;
      const puff = new THREE.Mesh(
        new THREE.SphereGeometry(size, 12, 8),
        cloudMat
      );
      puff.position.set(
        (p - puffs / 2) * (size * 0.7),
        Math.random() * 2,
        Math.random() * 3 - 1.5
      );
      puff.scale.y = 0.4 + Math.random() * 0.2; // flatten
      cloudGroup.add(puff);
    }
    
    cloudGroup.position.set(
      (Math.random() - 0.5) * 250,
      35 + Math.random() * 20,
      (Math.random() - 0.5) * 250
    );
    
    cloudGroup.userData.cloud = {
      speed: 0.3 + Math.random() * 0.5,
      startX: cloudGroup.position.x
    };
    
    scene.add(cloudGroup);
    clouds.push(cloudGroup);
  }
}

function animateClouds() {
  clouds.forEach(cloud => {
    const c = cloud.userData.cloud;
    cloud.position.x += c.speed * 0.016;
    // Loop back when too far
    if (cloud.position.x > 140) cloud.position.x = -140;
  });
}

function buildTraffic() {
  // Create vehicles on each road
  const roads = [];
  
  // Horizontal roads (along X axis, at z = i*20)
  for (let i = -3; i <= 3; i++) {
    roads.push({ axis: 'x', pos: i * 20, dir: i % 2 === 0 ? 1 : -1 });
  }
  // Vertical roads (along Z axis, at x = i*20)
  for (let i = -3; i <= 3; i++) {
    roads.push({ axis: 'z', pos: i * 20, dir: i % 2 === 0 ? 1 : -1 });
  }
  
  // 2-3 vehicles per road
  roads.forEach(road => {
    const count = 2 + Math.floor(Math.random() * 2);
    for (let v = 0; v < count; v++) {
      createVehicle(road);
    }
  });
}

function createVehicle(road) {
  const group = new THREE.Group();
  const color = VEHICLE_COLORS[Math.floor(Math.random() * VEHICLE_COLORS.length)];
  
  // Car body
  const bodyMat = new THREE.MeshStandardMaterial({
    color: color,
    roughness: 0.3,
    metalness: 0.5
  });
  
  // Main body
  const body = new THREE.Mesh(
    new THREE.BoxGeometry(1.8, 0.6, 1.0),
    bodyMat
  );
  body.position.y = 0.4;
  body.castShadow = true;
  group.add(body);
  
  // Cabin (top part)
  const cabin = new THREE.Mesh(
    new THREE.BoxGeometry(1.0, 0.5, 0.9),
    bodyMat
  );
  cabin.position.set(-0.1, 0.85, 0);
  cabin.castShadow = true;
  group.add(cabin);
  
  // Windshield
  const glassMat = new THREE.MeshStandardMaterial({
    color: 0xaaddff,
    roughness: 0.1,
    metalness: 0.8,
    transparent: true,
    opacity: 0.5
  });
  const windshield = new THREE.Mesh(
    new THREE.PlaneGeometry(0.85, 0.4),
    glassMat
  );
  windshield.position.set(0.4, 0.85, 0);
  windshield.rotation.y = Math.PI / 2;
  group.add(windshield);
  
  // Wheels (small dark cylinders)
  const wheelMat = new THREE.MeshStandardMaterial({ color: 0x222222 });
  const wheelGeo = new THREE.CylinderGeometry(0.18, 0.18, 0.12, 8);
  const wheelPositions = [
    [0.55, 0.18, 0.5], [0.55, 0.18, -0.5],
    [-0.55, 0.18, 0.5], [-0.55, 0.18, -0.5]
  ];
  wheelPositions.forEach(([wx, wy, wz]) => {
    const wheel = new THREE.Mesh(wheelGeo, wheelMat);
    wheel.position.set(wx, wy, wz);
    wheel.rotation.x = Math.PI / 2;
    group.add(wheel);
  });
  
  // Headlights
  const lightMat = new THREE.MeshBasicMaterial({ color: 0xffffcc });
  const hl = new THREE.Mesh(new THREE.BoxGeometry(0.05, 0.12, 0.2), lightMat);
  hl.position.set(0.93, 0.4, 0.3);
  group.add(hl);
  const hr = new THREE.Mesh(new THREE.BoxGeometry(0.05, 0.12, 0.2), lightMat);
  hr.position.set(0.93, 0.4, -0.3);
  group.add(hr);
  
  // Taillights
  const tailMat = new THREE.MeshBasicMaterial({ color: 0xcc2200 });
  const tl = new THREE.Mesh(new THREE.BoxGeometry(0.05, 0.1, 0.18), tailMat);
  tl.position.set(-0.93, 0.4, 0.3);
  group.add(tl);
  const tr = new THREE.Mesh(new THREE.BoxGeometry(0.05, 0.1, 0.18), tailMat);
  tr.position.set(-0.93, 0.4, -0.3);
  group.add(tr);
  
  // Position on road
  const startOffset = (Math.random() - 0.5) * 140;
  const laneOffset = (road.dir > 0 ? 1.3 : -1.3); // Right-hand lane
  const speed = 4 + Math.random() * 6; // units per second
  
  if (road.axis === 'x') {
    group.position.set(startOffset, 0, road.pos + laneOffset);
    group.rotation.y = road.dir > 0 ? 0 : Math.PI;
  } else {
    group.position.set(road.pos + laneOffset, 0, startOffset);
    group.rotation.y = road.dir > 0 ? -Math.PI / 2 : Math.PI / 2;
  }
  
  group.userData.vehicle = {
    road,
    speed: speed * road.dir,
    laneOffset
  };
  
  scene.add(group);
  vehicles.push(group);
}

function animateTraffic() {
  vehicles.forEach(v => {
    const data = v.userData.vehicle;
    const delta = 0.016;
    
    if (data.road.axis === 'x') {
      v.position.x += data.speed * delta;
      // Loop
      if (v.position.x > 80) v.position.x = -80;
      if (v.position.x < -80) v.position.x = 80;
    } else {
      v.position.z += data.speed * delta;
      if (v.position.z > 80) v.position.z = -80;
      if (v.position.z < -80) v.position.z = 80;
    }
  });
}

// ═══════════════════════════════════════════════════
// CONTROLS
// ═══════════════════════════════════════════════════
function setupControls() {
  const canvas = renderer.domElement;
  let dragStartTime = 0;
  let dragDistance = 0;
  
  // Mouse / Touch drag to pan camera
  canvas.addEventListener('pointerdown', (e) => {
    isDragging = true;
    dragStartTime = Date.now();
    dragDistance = 0;
    prevMouse.x = e.clientX;
    prevMouse.y = e.clientY;
    canvas.style.cursor = 'grabbing';
  });
  
  window.addEventListener('pointermove', (e) => {
    // Update mouse for raycasting
    mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
    
    if (isDragging) {
      const dx = e.clientX - prevMouse.x;
      const dy = e.clientY - prevMouse.y;
      dragDistance += Math.abs(dx) + Math.abs(dy);
      
      // Pan camera (adjusted for isometric angle)
      const panSpeed = 0.15;
      cameraTarget.x -= (dx * Math.cos(Math.PI / 4) + dy * Math.cos(Math.PI / 4)) * panSpeed;
      cameraTarget.z -= (-dx * Math.sin(Math.PI / 4) + dy * Math.sin(Math.PI / 4)) * panSpeed;
      
      // Clamp
      cameraTarget.x = Math.max(-80, Math.min(80, cameraTarget.x));
      cameraTarget.z = Math.max(-80, Math.min(80, cameraTarget.z));
      
      prevMouse.x = e.clientX;
      prevMouse.y = e.clientY;
    }
  });
  
  window.addEventListener('pointerup', (e) => {
    const wasDrag = dragDistance > 10;
    isDragging = false;
    canvas.style.cursor = 'default';
    
    // If it was a click (not drag), check for building hit
    if (!wasDrag) {
      checkBuildingClick(e);
    }
  });
  
  // Zoom with wheel  
  canvas.addEventListener('wheel', (e) => {
    e.preventDefault();
    zoomLevel += e.deltaY * 0.05;
    zoomLevel = Math.max(ZOOM_MIN, Math.min(ZOOM_MAX, zoomLevel));
  }, { passive: false });
  
  // Pinch zoom for mobile
  let lastPinchDist = 0;
  canvas.addEventListener('touchstart', (e) => {
    if (e.touches.length === 2) {
      const dx = e.touches[0].clientX - e.touches[1].clientX;
      const dy = e.touches[0].clientY - e.touches[1].clientY;
      lastPinchDist = Math.sqrt(dx * dx + dy * dy);
    }
  }, { passive: true });
  
  canvas.addEventListener('touchmove', (e) => {
    if (e.touches.length === 2) {
      const dx = e.touches[0].clientX - e.touches[1].clientX;
      const dy = e.touches[0].clientY - e.touches[1].clientY;
      const dist = Math.sqrt(dx * dx + dy * dy);
      const diff = lastPinchDist - dist;
      
      zoomLevel += diff * 0.15;
      zoomLevel = Math.max(ZOOM_MIN, Math.min(ZOOM_MAX, zoomLevel));
      
      lastPinchDist = dist;
    }
  }, { passive: true });
  
  // Close tooltip on click elsewhere
  document.addEventListener('click', (e) => {
    if (!e.target.closest('.brand-tooltip') && !e.target.closest('#gameCanvas')) {
      closeBrandTooltip();
    }
  });
}

function zoomIn() {
  zoomLevel = Math.max(ZOOM_MIN, zoomLevel - 8);
}
function zoomOut() {
  zoomLevel = Math.min(ZOOM_MAX, zoomLevel + 8);
}

function checkBuildingClick(e) {
  raycaster.setFromCamera(mouse, camera);
  const intersects = raycaster.intersectObjects(buildings);
  
  if (intersects.length > 0) {
    const hit = intersects[0].object;
    const brand = hit.userData.brand;
    if (brand) {
      showBrandTooltip(brand, e.clientX, e.clientY);
    }
  } else {
    closeBrandTooltip();
  }
}

function showBrandTooltip(brand, mx, my) {
  STATE.selectedBrand = brand;
  const tooltip = document.getElementById('brandTooltip');
  const brandEl = document.getElementById('tooltipBrand');
  const descEl = document.getElementById('tooltipDesc');
  
  brandEl.textContent = brand;
  descEl.textContent = `Visita el mundo ${brand}`;
  
  // Position tooltip near click
  let x = mx + 15;
  let y = my - 50;
  if (x + 220 > window.innerWidth) x = mx - 220;
  if (y < 10) y = 10;
  if (y + 120 > window.innerHeight) y = window.innerHeight - 130;
  
  tooltip.style.left = x + 'px';
  tooltip.style.top = y + 'px';
  tooltip.classList.add('active');
}

function closeBrandTooltip() {
  document.getElementById('brandTooltip').classList.remove('active');
  STATE.selectedBrand = null;
}

function enterBrand() {
  if (!STATE.selectedBrand) return;
  const slug = STATE.selectedBrand.toLowerCase().replace(/\s+/g, '');
  const url = `https://${slug}.concesionariovirtual.co`;
  
  // Show a nice transition
  const overlay = document.createElement('div');
  overlay.style.cssText = `
    position: fixed; inset: 0; background: var(--bg-dark); z-index: 300;
    display: flex; align-items: center; justify-content: center; flex-direction: column;
    opacity: 0; transition: opacity 0.5s;
  `;
  overlay.innerHTML = `
    <div style="font-family: 'Orbitron', sans-serif; font-size: 1.5rem; color: var(--primary); letter-spacing: 3px; margin-bottom: 12px;">
      ENTRANDO A
    </div>
    <div style="font-family: 'Orbitron', sans-serif; font-size: 2.5rem; color: #fff; letter-spacing: 4px; font-weight: 900;">
      ${STATE.selectedBrand}
    </div>
    <div class="loading-spinner" style="margin-top: 24px;"></div>
  `;
  document.body.appendChild(overlay);
  
  requestAnimationFrame(() => {
    overlay.style.opacity = '1';
  });
  
  setTimeout(() => {
    window.location.href = url;
  }, 1500);
}

// ═══════════════════════════════════════════════════
// MINIMAP
// ═══════════════════════════════════════════════════
function updateMinimap() {
  const canvas = document.getElementById('minimapCanvas');
  const ctx = canvas.getContext('2d');
  const w = canvas.width;
  const h = canvas.height;
  
  ctx.fillStyle = '#0a0e17';
  ctx.fillRect(0, 0, w, h);
  
  const scale = w / 160; // Map 160 units to canvas width
  const cx = w / 2;
  const cy = h / 2;
  
  // Draw roads
  ctx.strokeStyle = '#2a3a4a';
  ctx.lineWidth = 1;
  for (let i = -3; i <= 3; i++) {
    const pos = i * 20 * scale;
    ctx.beginPath();
    ctx.moveTo(0, cy + pos);
    ctx.lineTo(w, cy + pos);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(cx + pos, 0);
    ctx.lineTo(cx + pos, h);
    ctx.stroke();
  }
  
  // Draw buildings
  buildings.forEach(b => {
    if (!b.userData.brand) return;
    const group = b.userData.group;
    if (!group) return;
    const bx = cx + group.position.x * scale;
    const bz = cy + group.position.z * scale;
    
    const color = b.userData.originalColor;
    const r = (color >> 16) & 255;
    const g = (color >> 8) & 255;
    const bl = color & 255;
    
    ctx.fillStyle = `rgb(${r},${g},${bl})`;
    ctx.fillRect(bx - 3, bz - 2, 6, 4);
  });
  
  // Draw plaza
  ctx.fillStyle = '#00e5ff';
  ctx.beginPath();
  ctx.arc(cx, cy, 4, 0, Math.PI * 2);
  ctx.fill();
  
  // Draw camera position
  ctx.fillStyle = '#ff6d00';
  ctx.beginPath();
  ctx.arc(
    cx + cameraPos.x * scale,
    cy + cameraPos.z * scale,
    3, 0, Math.PI * 2
  );
  ctx.fill();
  
  // Border
  ctx.strokeStyle = 'rgba(0, 229, 255, 0.3)';
  ctx.lineWidth = 1;
  ctx.strokeRect(0, 0, w, h);
}

// ═══════════════════════════════════════════════════
// ANIMATION LOOP
// ═══════════════════════════════════════════════════
let time = 0;

function animate() {
  requestAnimationFrame(animate);
  time += 0.016;
  
  // Smooth camera follow with zoom
  cameraPos.x += (cameraTarget.x - cameraPos.x) * 0.08;
  cameraPos.z += (cameraTarget.z - cameraPos.z) * 0.08;
  
  // Camera at isometric-ish angle, distance controlled by zoomLevel
  const angle = Math.PI / 4; // 45 degrees
  const elevation = 0.85; // ratio of height to horizontal distance
  const hDist = zoomLevel * Math.cos(Math.atan(elevation));
  const vDist = zoomLevel * Math.sin(Math.atan(elevation));
  
  camera.position.set(
    cameraPos.x + Math.cos(angle) * hDist,
    vDist,
    cameraPos.z + Math.sin(angle) * hDist
  );
  camera.lookAt(cameraPos.x, 0, cameraPos.z);
  
  // Animate fountain particles
  scene.traverse((child) => {
    if (child.userData.particle) {
      const p = child.userData.particle;
      const t = time * p.speed + p.phase;
      child.position.y = 1.5 + (t % 3);
      child.position.x = Math.cos(p.angle + t * 0.5) * p.radius;
      child.position.z = Math.sin(p.angle + t * 0.5) * p.radius;
      child.material.opacity = 0.6 - (t % 3) * 0.2;
    }
    if (child.userData.isWater) {
      child.material.emissiveIntensity = 0.3 + Math.sin(time * 2) * 0.1;
    }
  });
  
  // Animate clouds & traffic
  animateClouds();
  animateTraffic();
  
  // Lazy load GLB models near camera
  if (Math.floor(time * 60) % 30 === 0) {
    updateGlbLoading();
  }
  
  // Raycast for hover effect
  if (!isDragging) {
    raycaster.setFromCamera(mouse, camera);
    const intersects = raycaster.intersectObjects(buildings);
    
    // Reset previous hover
    if (hoveredBuilding && (!intersects.length || intersects[0].object !== hoveredBuilding)) {
      const mat = hoveredBuilding.material;
      if (hoveredBuilding.userData.originalColor !== undefined) {
        mat.emissive.setHex(0x000000);
        mat.emissiveIntensity = 0;
      }
      hoveredBuilding = null;
      renderer.domElement.style.cursor = 'default';
    }
    
    if (intersects.length > 0) {
      const hit = intersects[0].object;
      if (hit.userData.brand && hit !== hoveredBuilding) {
        hoveredBuilding = hit;
        hit.material.emissive = new THREE.Color(0x00e5ff);
        hit.material.emissiveIntensity = 0.15;
        renderer.domElement.style.cursor = 'pointer';
      }
    }
  }
  
  renderer.render(scene, camera);
  
  // Update minimap periodically
  if (Math.floor(time * 10) % 5 === 0) {
    updateMinimap();
  }
}

function onResize() {
  if (!camera || !renderer) return;
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
}
