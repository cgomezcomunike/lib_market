	<style type="text/css">
		body{
			width: 100%;
			height: 100%;
			padding: 0px;
			margin: 0px;
			display: table;
			position: absolute;
			overflow: hidden;
		}
		#escritorio {
			position: absolute;
			/* background-image: linear-gradient(140deg, rgb(242,177,145),rgb(234,139,113), rgb(218,91,72));*/
			background-color: rgb(125, 125, 125);
			width: 100%;
			height: 100%;
			perspective: 800px;
			left: 0px;
			top: 0px;
		}


		.galeria {
			overflow: auto;
			position: absolute;
			left: 0px;
			top: 0px;
			width: calc(100% - 30px);

		}

	<script>
	let  scroll_historico = 0;
	let  fuerza_historico = 0;
	let contador = 0;

	let myTimeout



	document.getElementById('galeria').onscroll = function() {
		//scroll();
		myTimeout = setTimeout(scroll, 100);


	};


	function scroll() {

		console.log('exe'+contador);
		contador++;


		
		// calculamos la diferencia en el scroll
			let scroll_nuevo = document.getElementById('galeria').scrollTop;
			let scroll_diff = scroll_nuevo - scroll_historico;
			// console.log(scroll_nuevo + "--" + scroll_diff);

		// calculamos la rotacion
			let scala = 1


		// calculamos la escala
			let rotacion = 0;

		// variable de memoria para calculo
			let temp_calc


		if(scroll_diff > 0){
			// scala
			temp_calc = scroll_diff / 40;
			if(temp_calc > 1 ){ temp_calc = 1; }
			temp_calc = (fuerza_historico + temp_calc) / 2;
			fuerza_historico = temp_calc;


			rotacion =  (temp_calc * 30);
			scala = ((temp_calc * 0.5) - 1) * (-1);

			console.log("abajo");

			document.getElementById("galeria").style.transform = "scale("+scala+") rotateX(-"+rotacion+"deg)";
			document.getElementById("galeria").style.marginTop = "-2200px";


		}else if(scroll_diff < 0){
			// scala
			temp_calc = (scroll_diff * (-1)) / 40;
			if(temp_calc > 1 ){ temp_calc = 1; }
			temp_calc = (fuerza_historico + temp_calc) / 2;
			fuerza_historico = temp_calc;

			rotacion =  (temp_calc * 30);
			scala = ((temp_calc * 0.5) - 1) * (-1);

			console.log("arriba");

			document.getElementById("galeria").style.transform = "scale("+scala+") rotateX("+rotacion+"deg)";
			document.getElementById("galeria").style.marginTop = "-1800px";

		}else if(scroll_diff === 0){
			document.getElementById("galeria").style.transform = "scale(1) rotate(0deg)";
			document.getElementById("galeria").style.marginTop = "-2000px";

		}

		scroll_historico = scroll_nuevo;
		
		
		clearTimeout(myTimeout);
